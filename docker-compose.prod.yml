services:
  api:
    image: ${IMAGE:-ghcr.io/belgiumairporttransfers-creator/city-airport-taxis-backend:latest}
    pull_policy: always
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "127.0.0.1:${PORT:-5000}:5000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    mem_limit: 1024m
    cpus: 2.0

  redis:
    image: redis:7.4.2-alpine
    pull_policy: always
    restart: unless-stopped
    stop_grace_period: 10s
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5

networks:
  app:
    driver: bridge

volumes:
  redis_data:
